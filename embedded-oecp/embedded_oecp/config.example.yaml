source:
  dir: /path/to/your/os/source

oebuild:
  dir: /path/to/oebuild/workspace

sdk:
  path: /opt/openeuler/oecore-x86_64

device:
  ip: 192.168.1.100
  user: root
  password: your_password
  port: 22

community:
  baseline: https://repo.openeuler.org/openEuler-22.03-LTS-SP2/embedded_img/baseline.json

mugen:
  dir: /path/to/mugen
  at_config: embedded_at_test.json
  posix_config: embedded_posix_test.json

work_dir: /tmp/embedded-oecp
plan: all
verbose: false
